name: Pre-Race Scan

# UTC/JST 対応表 (JST = UTC+9)
# 08:00 JST = 23:00 UTC(前日)  /  22:45 JST = 13:45 UTC

on:
  schedule:
    # 08:00〜08:45 JST = UTC 前日 23:00〜23:45 — 15分おき
    - cron: "0,15,30,45 23 * * *"
    # 09:00〜22:45 JST = UTC 00:00〜13:45 — 15分おき
    - cron: "0,15,30,45 0-13 * * *"
  workflow_dispatch:
    inputs:
      stadium:
        description: "場名 例: 常滑  (空欄 = 全件実行)"
        required: false
        default: ""
      race_no:
        description: "レース番号 例: 1  (空欄 = 全件実行)"
        required: false
        default: ""
      force:
        description: "締切時刻チェックをスキップ (stadium/race_no 指定時に有効)"
        required: false
        type: boolean
        default: false

jobs:
  pre-race-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Show execution mode
        run: |
          STADIUM="${{ github.event.inputs.stadium }}"
          RACE_NO="${{ github.event.inputs.race_no }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ -n "$STADIUM" ] && [ -n "$RACE_NO" ]; then
            echo "mode        : pre_race"
            echo "実行モード  : single"
            echo "stadium     : $STADIUM"
            echo "race_no     : $RACE_NO"
            echo "force       : $FORCE"
          else
            echo "mode        : pre_race"
            echo "実行モード  : full (締切 45 分前のレースを自動選択)"
          fi

      - name: Run pre-race scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STADIUM="${{ github.event.inputs.stadium }}"
          RACE_NO="${{ github.event.inputs.race_no }}"
          FORCE="${{ github.event.inputs.force }}"

          if [ -n "$STADIUM" ] && [ -n "$RACE_NO" ]; then
            # single モード: 1レース指定
            FORCE_FLAG=""
            if [ "$FORCE" = "true" ]; then
              FORCE_FLAG="--force"
            fi
            python3 scraper/main.py pre_race \
              --stadium "$STADIUM" \
              --race-no "$RACE_NO" \
              $FORCE_FLAG
          else
            # full モード: 締切前レースを全件処理
            python3 scraper/main.py pre_race
          fi

      - name: Exhibition data check
        if: ${{ github.event.inputs.stadium == '' }}
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, sys
          sys.path.insert(0, "scraper")
          from db import get_client
          from datetime import date, datetime, timezone, timedelta

          db = get_client()
          JST = timezone(timedelta(hours=9))
          now_jst = datetime.now(JST)
          today = now_jst.date().isoformat()

          # 10:00 JST 以前はまだ展示が始まっていないのでスキップ
          if now_jst.hour < 10:
              print("展示チェックスキップ（10:00 JST 前）")
              sys.exit(0)

          races = db.table("races").select("id").eq("race_date", today).execute().data
          if not races:
              print("今日のレースなし")
              sys.exit(0)

          race_ids = [r["id"] for r in races]
          entries = db.table("entries").select("id,exhibition_time") \
              .in_("race_id", race_ids).execute().data

          total = len(entries)
          with_exh = sum(1 for e in entries if e.get("exhibition_time") is not None)
          rate = with_exh / total if total else 0

          print(f"今日の展示取得率: {rate*100:.1f}% ({with_exh}/{total})")

          if rate == 0 and total >= 6 and now_jst.hour >= 12:
              print("::warning::今日の展示データがゼロです。fetch_exhibition.py を確認してください。")
          PYEOF

      - name: Revalidate app cache
        if: always()
        env:
          APP_URL: ${{ secrets.APP_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          if [ -n "$APP_URL" ]; then
            curl -s -X POST "${APP_URL}/api/revalidate" \
              -H "Authorization: Bearer ${REVALIDATE_SECRET}" \
              -H "Content-Type: application/json" \
              -d '{"tags":["today-predictions","ops-data","schedule-data"]}' \
              || echo "Cache revalidation failed (non-fatal)"
          else
            echo "APP_URL not set, skipping revalidation"
          fi

      - name: Notify BUY races via ntfy
        if: ${{ github.event.inputs.stadium == '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python3 - <<'PYEOF'
          import os, sys
          sys.path.insert(0, "scraper")
          from db import get_client
          from datetime import date, datetime, timezone, timedelta

          db = get_client()
          JST = timezone(timedelta(hours=9))
          today = datetime.now(JST).date().isoformat()

          # 展示あり確定のBUY/CANDIDATEを取得
          races = db.table("races").select("id,stadium,race_no,close_time").eq("race_date", today).eq("status","final").execute().data
          race_map = {r["id"]: r for r in races}

          preds = db.table("predictions").select("race_id,decision,pick,confidence,reason") \
              .eq("decision", "buy").execute().data

          now = datetime.now(timezone.utc)
          buy_list = []
          for p in preds:
              r = race_map.get(p["race_id"])
              if not r:
                  continue
              reason = p.get("reason") or ""
              if "[展示未取得]" in reason or "朝スキャン暫定" in reason:
                  continue
              # 締切時刻をJSTに変換
              close_str = r["close_time"]
              try:
                  close_dt = datetime.fromisoformat(close_str)
                  if close_dt.tzinfo is None:
                      close_dt = close_dt.replace(tzinfo=timezone.utc)
                  # 締切済みのレースは通知しない（スキャン直後の1回だけ通知するため）
                  if close_dt <= now:
                      continue
                  close_jst = close_dt.astimezone(JST).strftime("%H:%M")
              except Exception:
                  continue
              buy_list.append((r["stadium"], r["race_no"], close_jst, p["pick"], p["confidence"]))

          if not buy_list:
              print("通知対象なし")
              sys.exit(0)

          import urllib.request, json
          topic = os.environ["NTFY_TOPIC"]
          for stadium, race_no, close_jst, pick, conf in buy_list:
              msg = f"🎯 {stadium} {race_no}R\n締切 {close_jst} | {pick} | {conf:.0f}pt"
              req = urllib.request.Request(
                  f"https://ntfy.sh/{topic}",
                  data=msg.encode("utf-8"),
                  headers={
                      "Title": "BUY",
                      "Tags": "white_check_mark",
                      "Content-Type": "text/plain; charset=utf-8",
                  },
              )
              urllib.request.urlopen(req)
              print(f"通知送信: {msg}")
          PYEOF
