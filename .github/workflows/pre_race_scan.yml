name: Pre-Race Scan

# UTC/JST 対応表 (JST = UTC+9)
# 09:00 JST = 00:00 UTC  /  16:30 JST = 07:30 UTC

on:
  schedule:
    # 09:00〜15:50 JST (UTC 00:00〜06:50) — 10分おき
    - cron: "*/10 0-6 * * *"
    # 16:00〜16:30 JST (UTC 07:00〜07:30) — 10分おき
    - cron: "0,10,20,30 7 * * *"
  workflow_dispatch:

jobs:
  pre-race-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run pre-race scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scraper/main.py pre_race
