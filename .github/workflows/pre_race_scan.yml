name: Pre-Race Scan

# UTC/JST 対応表 (JST = UTC+9)
# 09:00 JST = 00:00 UTC  /  16:30 JST = 07:30 UTC

on:
  schedule:
    # 08:00〜08:30 JST = UTC 前日 23:00〜23:30 — 30分おき
    - cron: "0,30 23 * * *"
    # 09:00〜22:30 JST = UTC 00:00〜13:30 — 30分おき（GitHub throttling 対策）
    - cron: "0,30 0-13 * * *"
  workflow_dispatch:
    inputs:
      stadium:
        description: "場名 例: 常滑  (空欄 = 全件実行)"
        required: false
        default: ""
      race_no:
        description: "レース番号 例: 1  (空欄 = 全件実行)"
        required: false
        default: ""
      force:
        description: "締切時刻チェックをスキップ (stadium/race_no 指定時に有効)"
        required: false
        type: boolean
        default: false

jobs:
  pre-race-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Show execution mode
        run: |
          STADIUM="${{ github.event.inputs.stadium }}"
          RACE_NO="${{ github.event.inputs.race_no }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ -n "$STADIUM" ] && [ -n "$RACE_NO" ]; then
            echo "mode        : pre_race"
            echo "実行モード  : single"
            echo "stadium     : $STADIUM"
            echo "race_no     : $RACE_NO"
            echo "force       : $FORCE"
          else
            echo "mode        : pre_race"
            echo "実行モード  : full (締切 45 分前のレースを自動選択)"
          fi

      - name: Run pre-race scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STADIUM="${{ github.event.inputs.stadium }}"
          RACE_NO="${{ github.event.inputs.race_no }}"
          FORCE="${{ github.event.inputs.force }}"

          if [ -n "$STADIUM" ] && [ -n "$RACE_NO" ]; then
            # single モード: 1レース指定
            FORCE_FLAG=""
            if [ "$FORCE" = "true" ]; then
              FORCE_FLAG="--force"
            fi
            python3 scraper/main.py pre_race \
              --stadium "$STADIUM" \
              --race-no "$RACE_NO" \
              $FORCE_FLAG
          else
            # full モード: 締切前レースを全件処理
            python3 scraper/main.py pre_race
          fi
