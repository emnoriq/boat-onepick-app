name: DB Migration

on:
  workflow_dispatch:
    inputs:
      sql:
        description: "実行するSQL"
        required: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install requests

      - name: Run migration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, requests, sys

          url = os.environ["SUPABASE_URL"]
          token = os.environ.get("SUPABASE_ACCESS_TOKEN", "")
          sql = """${{ github.event.inputs.sql }}"""

          if not token:
              print("❌ SUPABASE_ACCESS_TOKEN が未設定です")
              print("   https://supabase.com/dashboard/account/tokens でトークンを作成し")
              print("   GitHub Secrets に SUPABASE_ACCESS_TOKEN として登録してください")
              sys.exit(1)

          print(f"実行SQL: {sql[:120]}")

          project_ref = url.replace("https://", "").split(".")[0]
          resp = requests.post(
              f"https://api.supabase.com/v1/projects/{project_ref}/database/query",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              },
              json={"query": sql},
              timeout=30,
          )
          print(f"status: {resp.status_code}")
          print(f"body: {resp.text[:500]}")

          if resp.status_code not in (200, 201):
              print(f"❌ マイグレーション失敗 (status={resp.status_code})")
              sys.exit(1)

          print("✅ マイグレーション成功")
          EOF
