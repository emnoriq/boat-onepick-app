name: Morning Scan

on:
  schedule:
    # 06:00 JST = UTC 21:00 (前日)
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 YYYY-MM-DD (省略時: JST今日)"
        required: false
      stadium:
        description: "場名フィルタ 例: 常滑 (省略時: 全場)"
        required: false
      limit_races:
        description: "取得レース数の上限 例: 10 (手動テスト用, 省略時: 全件)"
        required: false

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    # 並列化後の想定: 全件新規 ≈ 8-10分。並列化前実績 41分40秒。
    # 万一の retryや多場対応のバッファ込みで 60分。
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Show execution date (debug)
        run: |
          echo "UTC  now : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "JST  now : $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')"
          echo "date.today() would return: $(date -u '+%Y-%m-%d')"
          echo "JST today should be      : $(TZ=Asia/Tokyo date '+%Y-%m-%d')"

      - name: Run morning scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ -n "${{ github.event.inputs.stadium }}" ]; then
            ARGS="$ARGS --stadium ${{ github.event.inputs.stadium }}"
          fi
          if [ -n "${{ github.event.inputs.limit_races }}" ]; then
            ARGS="$ARGS --limit-races ${{ github.event.inputs.limit_races }}"
          fi
          python3 scraper/main.py morning $ARGS
