name: Morning Scan

on:
  schedule:
    # 06:00 JST = UTC 21:00 (前日)
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 YYYY-MM-DD (省略時: 今日)"
        required: false

jobs:
  morning-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # 高速化後の実績値は 3-7 分想定。最大 24 場対応のバッファ。

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run morning scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          python3 scraper/main.py morning $DATE_ARG
