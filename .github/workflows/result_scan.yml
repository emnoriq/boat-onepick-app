name: Result Scan

# UTC/JST 対応表 (JST = UTC+9)
# 10:00 JST = 01:00 UTC  /  17:00 JST = 08:00 UTC

on:
  schedule:
    # 10:00〜16:45 JST (UTC 01:00〜07:45) — 15分おき
    - cron: "*/15 1-7 * * *"
    # 17:00 JST (UTC 08:00) — 最終回
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "対象日 YYYY-MM-DD (省略時: 今日)"
        required: false

jobs:
  result-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run result scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi
          python3 scraper/main.py result $DATE_ARG
