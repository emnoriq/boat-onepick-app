name: Result Scan

# UTC/JST 対応表 (JST = UTC+9)
# 10:00 JST = 01:00 UTC  /  17:00 JST = 08:00 UTC

on:
  # schedule は一時停止中（GitHub Actions 無料枠節約のため）
  # 再開する場合は以下のコメントを外す:
  # schedule:
  #   - cron: "30 0-13 * * *"
  #   - cron: "0 1-14 * * *"
  workflow_dispatch:
    inputs:
      stadium:
        description: "場名 例: 常滑  (空欄 = 全件実行)"
        required: false
        default: ""
      race_no:
        description: "レース番号 例: 1  (空欄 = 全件実行)"
        required: false
        default: ""
      date:
        description: "対象日 YYYY-MM-DD 例: 2026-05-03  (空欄 = 今日)"
        required: false
        default: ""
      force:
        description: "status チェックをスキップして強制取得 (stadium/race_no 指定時に有効)"
        required: false
        type: boolean
        default: false

jobs:
  result-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Show execution mode
        run: |
          STADIUM="${{ github.event.inputs.stadium }}"
          RACE_NO="${{ github.event.inputs.race_no }}"
          DATE_IN="${{ github.event.inputs.date }}"
          FORCE="${{ github.event.inputs.force }}"
          TARGET_DATE="${DATE_IN:-$(date -u '+%Y-%m-%d')}"
          if [ -n "$STADIUM" ] && [ -n "$RACE_NO" ]; then
            echo "mode        : result"
            echo "実行モード  : single"
            echo "stadium     : $STADIUM"
            echo "race_no     : $RACE_NO"
            echo "date        : $TARGET_DATE"
            echo "force       : $FORCE"
          else
            echo "mode        : result"
            echo "実行モード  : full (締切10分超過・未完了レースを自動選択)"
            echo "date        : $TARGET_DATE"
          fi

      - name: Run result scan
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STADIUM="${{ github.event.inputs.stadium }}"
          RACE_NO="${{ github.event.inputs.race_no }}"
          DATE_IN="${{ github.event.inputs.date }}"
          FORCE="${{ github.event.inputs.force }}"

          DATE_ARG=""
          if [ -n "$DATE_IN" ]; then
            DATE_ARG="--date $DATE_IN"
          fi

          if [ -n "$STADIUM" ] && [ -n "$RACE_NO" ]; then
            # single モード: 1レース指定
            FORCE_FLAG=""
            if [ "$FORCE" = "true" ]; then
              FORCE_FLAG="--force"
            fi
            python3 scraper/main.py result \
              --stadium "$STADIUM" \
              --race-no "$RACE_NO" \
              $DATE_ARG \
              $FORCE_FLAG
          else
            # full モード: status=final のレースを全件処理
            python3 scraper/main.py result $DATE_ARG
          fi
