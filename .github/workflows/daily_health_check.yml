name: "日次データ品質チェック"

# ─────────────────────────────────────────────────────────────────────────────
# 毎日 15:00 UTC (24:00 JST) に自動実行
#   - 展示データ収集率（7日・30日）
#   - BUY的中率（30日）
#   - prediction/result 欠落検出
#
# 問題検出時: GitHub Actions の Summary に警告を表示
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "0 15 * * *"   # JST 毎日 24:00 (翌0:00)
  workflow_dispatch:
    inputs:
      days:
        description: "集計対象の直近N日 (default: 30)"
        required: false
        default: "30"

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run data health check
        id: health
        run: |
          python3 scraper/data_health.py \
            --days ${{ github.event.inputs.days || '30' }} \
            --exit-code 2>&1 | tee /tmp/health_report.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: true

      - name: Post summary to GitHub Actions
        run: |
          echo "## データ品質レポート" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/health_report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail if issues detected
        if: steps.health.outputs.exit_code != '0'
        run: |
          echo "❌ データ品質に問題が検出されました。上記レポートを確認してください。"
          exit 1
